# maestro-council defaults. Existing environment variables take precedence.
# Named instances append "-<instance>" to these base window and pane labels.

: "${MAESTRO_COUNCIL_WINDOW:=maestro-council}"
: "${MAESTRO_COUNCIL_CODEX_LABEL:=council-codex}"
: "${MAESTRO_COUNCIL_CC_LABEL:=council-cc}"
: "${MAESTRO_COUNCIL_AMP_LABEL:=council-amp}"

: "${MAESTRO_COUNCIL_CODEX_CMD:=codex}"
: "${MAESTRO_COUNCIL_CC_CMD:=claude --permission-mode bypassPermissions}"
: "${MAESTRO_COUNCIL_AMP_CMD:=amp}"

: "${MAESTRO_COUNCIL_TIMEOUT:=900}"
: "${MAESTRO_COUNCIL_POLL_INTERVAL:=0.5}"
: "${MAESTRO_COUNCIL_MAX_REVIEW_ROUNDS:=2}"
: "${MAESTRO_COUNCIL_AGENT_READY_TIMEOUT:=60}"
# Run `council run` in a split pane and keep that pane open after exit.
: "${MAESTRO_COUNCIL_ORCHESTRATE_IN_PANE:=1}"
# Where that split pane should go: `current` or `council`.
: "${MAESTRO_COUNCIL_ORCHESTRATOR_PANE_TARGET:=council}"
# Height of the orchestration pane in tmux lines.
: "${MAESTRO_COUNCIL_ORCHESTRATOR_PANE_LINES:=14}"
# Width of the council-window orchestration pane in tmux columns.
: "${MAESTRO_COUNCIL_ORCHESTRATOR_PANE_WIDTH:=20}"
# Orchestrator output color: auto, always, or never.
: "${MAESTRO_COUNCIL_COLOR:=always}"
